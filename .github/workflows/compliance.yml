name: Compliance & Build Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  compliance-check:
    name: Compliance Self-Check (변호사법 회피 7원칙)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run compliance self-check
        run: node scripts/compliance-check.js

      - name: Compliance summary
        if: success()
        run: |
          echo "✅ 회피 7원칙 모든 검사 통과"
          echo "변호사법 109조·34조 회피 설계 무결성 확인됨"

  build-jeonse-explorer:
    name: Build jeonse-explorer plugin (MCP server)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: plugins/jeonse-explorer/mcp-server/package-lock.json

      - name: Install dependencies
        working-directory: plugins/jeonse-explorer/mcp-server
        run: npm install --no-audit --no-fund

      - name: Type check
        working-directory: plugins/jeonse-explorer/mcp-server
        run: npx tsc --noEmit

      - name: Build
        working-directory: plugins/jeonse-explorer/mcp-server
        run: npm run build

      - name: Verify dist artifacts
        working-directory: plugins/jeonse-explorer/mcp-server
        run: |
          test -f dist/index.js
          test -f dist/index-stdio.js
          test -f dist/distributions.js
          test -f dist/guardrails.js
          test -f dist/tools/analyze.js
          test -f dist/tools/lawSummary.js
          echo "✅ 모든 빌드 산출물 정상 생성"

  smoke-test-mcp-server:
    name: Smoke test MCP server (stdio mode)
    runs-on: ubuntu-latest
    needs: build-jeonse-explorer
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install + build
        working-directory: plugins/jeonse-explorer/mcp-server
        run: |
          npm install --no-audit --no-fund
          npm run build

      - name: list_tools smoke test
        working-directory: plugins/jeonse-explorer/mcp-server
        run: |
          INIT='{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci-smoke","version":"1.0"}}}'
          INITIALIZED='{"jsonrpc":"2.0","method":"notifications/initialized"}'
          LIST='{"jsonrpc":"2.0","id":2,"method":"tools/list"}'
          RESULT=$(printf '%s\n%s\n%s\n' "$INIT" "$INITIALIZED" "$LIST" | timeout 5 node dist/index-stdio.js 2>/dev/null | grep -o '"name":"analyze_jeonse_fraud_distribution"' | head -1)
          if [ -z "$RESULT" ]; then
            echo "❌ MCP 서버 list_tools 실패 — analyze_jeonse_fraud_distribution 도구 응답 없음"
            exit 1
          fi
          echo "✅ MCP 서버 list_tools 정상 응답"

      - name: PII guardrail smoke test
        working-directory: plugins/jeonse-explorer/mcp-server
        run: |
          INIT='{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci-smoke","version":"1.0"}}}'
          INITIALIZED='{"jsonrpc":"2.0","method":"notifications/initialized"}'
          CALL='{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"analyze_jeonse_fraud_distribution","arguments":{"deposit_range":"100m_to_300m","priority_right":"full_protection","landlord_property_count":"one","auction_status":"in_progress","investigation_status":"investigating","victim_count":"self_only","region":"seoul","landlord_phone":"010-1234-5678"}}}'
          OUTPUT=$(printf '%s\n%s\n%s\n' "$INIT" "$INITIALIZED" "$CALL" | timeout 5 node dist/index-stdio.js 2>/dev/null)
          if echo "$OUTPUT" | grep -q 'pii_detected' && echo "$OUTPUT" | grep -q '"isError":true'; then
            echo "✅ PII 가드레일 정상 동작 (가해자 식별 정보 input 차단됨, isError=true)"
          else
            echo "❌ PII 가드레일 동작 실패 — pii_detected + isError 응답 미검출"
            echo "--- received output ---"
            echo "$OUTPUT" | head -20
            exit 1
          fi
